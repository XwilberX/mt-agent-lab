services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mt-agent-lab-pg
    environment:
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
      POSTGRES_DB: mt_agent_lab
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d mt_agent_lab"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
